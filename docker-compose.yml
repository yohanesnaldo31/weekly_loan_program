services:
  loan-db:
    image: postgres:latest
    container_name: loan-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loan
    ports:
      - "5432:5432"
    volumes:
      - loan-db-data:/var/lib/postgresql
      - ./sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d loan"]
      interval: 5s
      timeout: 5s
      retries: 5

  loan-redis:
    image: redis:latest
    container_name: loan-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - loan-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  loan-db-data:
  loan-redis-data:
